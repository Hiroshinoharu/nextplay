services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-nextplay}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-nextplay}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations/migrate_igdb_db.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations/add_total_rating.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations/add_popularity.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextplay}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  user:
    build:
      context: ..
      dockerfile: services/user/Dockerfile
    expose:
      - "8083"
    env_file:
      - env/user.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8083"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      PASSWORD_PEPPER: "${PASSWORD_PEPPER:?set PASSWORD_PEPPER in .env}"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://user:8083/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  game:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    expose:
      - "8081"
    env_file:
      - env/game.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8081"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      LOCAL_DATABASE_URL: "${LOCAL_DATABASE_URL:?set LOCAL_DATABASE_URL in .env}"
      GATEWAY_SERVICE_TOKEN: "${GATEWAY_SERVICE_TOKEN:?set GATEWAY_SERVICE_TOKEN in .env}"
      IGDB_CLIENT_ID: "${IGDB_CLIENT_ID:?set IGDB_CLIENT_ID in .env}"
      IGDB_ACCESS_TOKEN: "${IGDB_ACCESS_TOKEN:?set IGDB_ACCESS_TOKEN in .env}"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://game:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  game-etl:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    env_file:
      - env/game.env
    environment:
      CONFIG_FILE: /config/config.yaml
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      GATEWAY_SERVICE_TOKEN: "${GATEWAY_SERVICE_TOKEN:?set GATEWAY_SERVICE_TOKEN in .env}"
      IGDB_CLIENT_ID: "${IGDB_CLIENT_ID:?set IGDB_CLIENT_ID in .env}"
      IGDB_ACCESS_TOKEN: "${IGDB_ACCESS_TOKEN:?set IGDB_ACCESS_TOKEN in .env}"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/game-etl"]
    profiles: ["etl"]
    restart: "no"

  recommender:
    build:
      context: ..
      dockerfile: services/recommender/Dockerfile
    expose:
      - "8082"
    env_file:
      - env/recommender.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8082"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      GATEWAY_SERVICE_TOKEN: "${GATEWAY_SERVICE_TOKEN:?set GATEWAY_SERVICE_TOKEN in .env}"
      RANK_WEIGHT_LIKED_KEYWORD: "${RANK_WEIGHT_LIKED_KEYWORD:-4.0}"
      RANK_WEIGHT_LIKED_PLATFORM: "${RANK_WEIGHT_LIKED_PLATFORM:-2.5}"
      RANK_WEIGHT_ANSWER_TOKEN: "${RANK_WEIGHT_ANSWER_TOKEN:-1.2}"
      RANK_WEIGHT_FAVORITE_KEYWORD: "${RANK_WEIGHT_FAVORITE_KEYWORD:-2.2}"
      RANK_WEIGHT_FAVORITE_PLATFORM: "${RANK_WEIGHT_FAVORITE_PLATFORM:-1.3}"
      RANK_WEIGHT_FAVORITE_GENRE: "${RANK_WEIGHT_FAVORITE_GENRE:-1.6}"
      RANK_WEIGHT_FAVORITE_TEXT_SIM: "${RANK_WEIGHT_FAVORITE_TEXT_SIM:-4.8}"
      RANK_WEIGHT_DISLIKED_KEYWORD: "${RANK_WEIGHT_DISLIKED_KEYWORD:-5.5}"
      RANK_WEIGHT_DISLIKED_PLATFORM: "${RANK_WEIGHT_DISLIKED_PLATFORM:-4.0}"
      RANK_WEIGHT_MODEL_SEED_BOOST: "${RANK_WEIGHT_MODEL_SEED_BOOST:-3.0}"
      RANK_WEIGHT_FAVORITE_SEED_BOOST: "${RANK_WEIGHT_FAVORITE_SEED_BOOST:-4.0}"
      RANK_CAP_POPULARITY: "${RANK_CAP_POPULARITY:-1.2}"
      RANK_CAP_RATING: "${RANK_CAP_RATING:-1.0}"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
      - ../services/recommender/training/artifacts/current:/models/recommender/current:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -g -fsS http://[::1]:8082/health >/dev/null 2>&1 || curl -fsS http://127.0.0.1:8082/health >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "${GATEWAY_HOST_PORT:-18084}:8084"
    env_file:
      - env/gateway.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8084"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      GATEWAY_SERVICE_TOKEN: "${GATEWAY_SERVICE_TOKEN:?set GATEWAY_SERVICE_TOKEN in .env}"
      APP_ENV: "${APP_ENV:-development}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_HOST_PORT:-5173},http://127.0.0.1:${FRONTEND_HOST_PORT:-5173},http://localhost:5174,http://127.0.0.1:5174}"
      AUTH_RATE_LIMIT_MAX: "${AUTH_RATE_LIMIT_MAX:-10}"
      AUTH_RATE_LIMIT_WINDOW_SECONDS: "${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}"
      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME:-nextplay_session}"
      SESSION_COOKIE_MAX_AGE_SECONDS: "${SESSION_COOKIE_MAX_AGE_SECONDS:-86400}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      CSRF_COOKIE_NAME: "${CSRF_COOKIE_NAME:-nextplay_csrf}"
      CSRF_HEADER_NAME: "${CSRF_HEADER_NAME:-X-CSRF-Token}"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      user:
        condition: service_healthy
      game:
        condition: service_healthy
      recommender:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://gateway:8084/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      GATEWAY_UPSTREAM_URL: "${GATEWAY_UPSTREAM_URL:-http://gateway:8084}"
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

