version: '3.9'

services:
  # -------------------------------------------------------
  #  POSTGRES DATABASE SERVICE
  # -------------------------------------------------------
  postgres:
    image: postgres:16 # Use the official PostgreSQL version 16 image
    environment:
      POSTGRES_USER: nextplay       # Database username
      POSTGRES_PASSWORD: nextplay   # Database password
      POSTGRES_DB: nextplay         # Database name to create on startup
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro # Initialize DB with schema
      - ./migrations:/docker-entrypoint-initdb.d/migrations/migrate_igdb_db.sql:ro # Run migrations on first startup
      - ./migrations:/docker-entrypoint-initdb.d/migrations/add_total_rating.sql:ro # Additional migration
      - ./migrations:/docker-entrypoint-initdb.d/migrations/add_popularity.sql:ro # Additional migration
    ports:
      - "5432:5432" # Expose DB so you can connect from your host (DBeaver, psql, etc.)
    # Healthcheck ensures Postgres is fully ready before other services start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextplay"] # Built-in readiness test
      interval: 5s   # Check every 5 seconds
      timeout: 5s    # Fail if Postgres doesn't answer in 5s
      retries: 5     # Retry 5 times before marking unhealthy
      start_period: 10s # Allow Postgres extra time to boot up

  # -------------------------------------------------------
  #  USER SERVICE (Go / Fiber)
  # -------------------------------------------------------
  user:
    build:
      context: ..
      dockerfile: services/user/Dockerfile # Build Dockerfile located in services/user
    ports:
      - "8083:8083"
    env_file:
      - env/user.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8083"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy # Only start when Postgres is ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://user:8083/health"] # Use container port
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  #  GAME SERVICE (Go / Fiber)
  # -------------------------------------------------------
  game:
    build:
      context: ..
      dockerfile: services/game/Dockerfile # Build Dockerfile located in services/game
    ports:
      - "8081:8081"
    env_file:
      - env/game.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8081"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://game:8081/health"] # Checks if service responds
      interval: 5s
      timeout: 3s
      retries: 5
  
  #-------------------------------------------------------
  # GAME ETL SERVICE (Go)
  #-------------------------------------------------------
  game-etl:
    build:
      context: ..
      dockerfile: services/game/Dockerfile
    env_file:
      - env/game.env
    environment:
      CONFIG_FILE: /config/config.yaml
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["go", "run", "./etl"]
    profiles: ["etl"]
    restart: "no"

  # -------------------------------------------------------
  #  RECOMMENDER SERVICE (Python FastAPI)
  # -------------------------------------------------------
  recommender:
    build:
      context: .. # Build from the root directory
      dockerfile: services/recommender/Dockerfile # Specify recommender Dockerfile 
    ports:
      - "8082:8082"
    env_file:
      - env/recommender.env
    environment:
      CONFIG_FILE: /config/config.yaml
      PORT: "8082"
      # Hybrid ranking weights: defaults below = balanced profile.
      # Override these via environment or Make targets for A/B tuning.
      RANK_WEIGHT_LIKED_KEYWORD: "${RANK_WEIGHT_LIKED_KEYWORD:-4.0}"
      RANK_WEIGHT_LIKED_PLATFORM: "${RANK_WEIGHT_LIKED_PLATFORM:-2.5}"
      RANK_WEIGHT_ANSWER_TOKEN: "${RANK_WEIGHT_ANSWER_TOKEN:-1.6}"
      RANK_WEIGHT_FAVORITE_KEYWORD: "${RANK_WEIGHT_FAVORITE_KEYWORD:-3.0}"
      RANK_WEIGHT_FAVORITE_PLATFORM: "${RANK_WEIGHT_FAVORITE_PLATFORM:-1.8}"
      RANK_WEIGHT_FAVORITE_GENRE: "${RANK_WEIGHT_FAVORITE_GENRE:-2.2}"
      RANK_WEIGHT_FAVORITE_TEXT_SIM: "${RANK_WEIGHT_FAVORITE_TEXT_SIM:-6.5}"
      RANK_WEIGHT_DISLIKED_KEYWORD: "${RANK_WEIGHT_DISLIKED_KEYWORD:-5.5}"
      RANK_WEIGHT_DISLIKED_PLATFORM: "${RANK_WEIGHT_DISLIKED_PLATFORM:-4.0}"
      RANK_WEIGHT_MODEL_SEED_BOOST: "${RANK_WEIGHT_MODEL_SEED_BOOST:-3.0}"
      RANK_WEIGHT_FAVORITE_SEED_BOOST: "${RANK_WEIGHT_FAVORITE_SEED_BOOST:-6.0}"
      RANK_CAP_POPULARITY: "${RANK_CAP_POPULARITY:-1.2}"
      RANK_CAP_RATING: "${RANK_CAP_RATING:-1.0}"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
      - ../services/recommender/training/artifacts/current:/models/recommender/current:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Uses FastAPI /docs endpoint as a health indicator
      test: ["CMD", "curl", "-f", "http://recommender:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  #  API GATEWAY (Go / Fiber)
  # -------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile # Build gateway from its Dockerfile
    ports:
      - "8084:8084" # Main entry point for frontend <-> backend API
    env_file:
      - env/gateway.env
    environment:      
      CONFIG_FILE: /config/config.yaml
      PORT: "8084"
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      user:
        condition: service_healthy      # Wait until user service responds
      game:
        condition: service_healthy      # Wait until game service responds
      recommender:
        condition: service_healthy      # Wait until recommender is healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://gateway:8084/health"] # Gateway health check
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  #  FRONTEND SERVICE (React / Vite)
  # -------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile # Build frontend Dockerfile
    ports:
      - "5173:80" # Expose frontend locally
    depends_on:
      gateway:
        condition: service_healthy # Only start UI when backend gateway works
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
