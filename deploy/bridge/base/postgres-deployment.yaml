apiVersion: apps/v1
kind: Deployment
metadata:
    name: postgres
    namespace: deploy
    labels:
        com.docker.compose.project: deploy
        com.docker.compose.service: postgres
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: deploy
            com.docker.compose.service: postgres
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: deploy
                com.docker.compose.service: postgres
                com.docker.compose.network.default: "true"
        spec:
            containers:
                - name: postgres
                  image: postgres:16
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: POSTGRES_DB
                      value: "nextplay"
