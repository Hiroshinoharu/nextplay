#! gateway-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: gateway
    namespace: deploy
    labels:
        com.docker.compose.project: deploy
        com.docker.compose.service: gateway
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: deploy
            com.docker.compose.service: gateway
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: deploy
                com.docker.compose.service: gateway
                com.docker.compose.network.default: "true"
        spec:
            containers:
                - name: gateway
                  image: deploy-gateway
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AUTH_RATE_LIMIT_MAX
                      value: "10"
                    - name: AUTH_RATE_LIMIT_WINDOW_SECONDS
                      value: "60"
                    - name: CORS_ALLOWED_ORIGINS
                      value: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"
                    - name: GAME_SERVICE_URL
                      value: "http://game.deploy.svc.cluster.local:8081"
                    - name: GATEWAY_SERVICE_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: nextplay-secrets
                          key: gateway_service_token
                    - name: GATEWAY_UPSTREAM_TIMEOUT_SECONDS
                      value: "60"
                    - name: JWT_SECRET
                      valueFrom:
                        secretKeyRef:
                          name: nextplay-secrets
                          key: jwt_secret
                    - name: PORT
                      value: "8084"
                    - name: RECOMMENDER_SERVICE_URL
                      value: "http://recommender.deploy.svc.cluster.local:8082"
                    - name: USER_SERVICE_URL
                      value: "http://user.deploy.svc.cluster.local:8083"
                  livenessProbe:
                    exec:
                        command: ['curl', '-f', 'http://localhost:8084/health']
                    initialDelaySeconds: 10
                    periodSeconds: 5
                    timeoutSeconds: 3
                    failureThreshold: 5
                  ports:
                    - name: gateway-8084
                      containerPort: 8084
