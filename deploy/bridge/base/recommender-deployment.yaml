apiVersion: apps/v1
kind: Deployment
metadata:
    name: recommender
    namespace: deploy
    labels:
        com.docker.compose.project: deploy
        com.docker.compose.service: recommender
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: deploy
            com.docker.compose.service: recommender
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: deploy
                com.docker.compose.service: recommender
                com.docker.compose.network.default: "true"
        spec:
