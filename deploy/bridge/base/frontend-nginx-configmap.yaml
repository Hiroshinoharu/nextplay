apiVersion: v1
kind: ConfigMap
metadata:
    name: frontend-nginx-config
    namespace: deploy
data:
    default.conf: |
        server {
          listen 80;
          server_name _;
          server_tokens off;

          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "DENY" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
          add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; form-action 'self'; frame-ancestors 'none'; frame-src https://www.youtube.com https://www.youtube-nocookie.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;" always;

          root /usr/share/nginx/html;
          index index.html;

          location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
          }

          location / {
            try_files $uri /index.html;
          }

          location /api/ {
            proxy_pass http://gateway.deploy.svc.cluster.local:8084/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
          }
        }

