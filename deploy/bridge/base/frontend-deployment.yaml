apiVersion: apps/v1
kind: Deployment
metadata:
    name: frontend
    namespace: deploy
    labels:
        com.docker.compose.project: deploy
        com.docker.compose.service: frontend
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: deploy
            com.docker.compose.service: frontend
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: deploy
                com.docker.compose.service: frontend
                com.docker.compose.network.default: "true"
        spec:
            containers:
                - name: frontend
                  image: deploy-frontend
                  imagePullPolicy: IfNotPresent
