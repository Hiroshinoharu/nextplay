                    exec:
                        command:
                            - /bin/sh
                            - -c
                            - wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 5
                  ports:
                    - name: frontend-80
                      containerPort: 80
                  volumeMounts:
                    - name: frontend-nginx-config
                      mountPath: /etc/nginx/conf.d/default.conf
                      subPath: default.conf
                      readOnly: true
            volumes:
                - name: frontend-nginx-config
                  configMap:
                    name: frontend-nginx-config
