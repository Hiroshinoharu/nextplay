name: NextPlay CD - Deploy to Railway

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["NextPlay CI - Build & Test"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: railway-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_NAME: ${{ vars.RAILWAY_ENVIRONMENT_NAME || 'production' }}

    steps:
      - name: Checkout triggering commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout selected ref
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Validate Railway deployment config
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing required secret: RAILWAY_TOKEN" >&2
            exit 1
          fi
          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
            echo "Missing required repository variable: RAILWAY_PROJECT_ID" >&2
            exit 1
          fi

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy services to Railway
        run: |
          set -euo pipefail
          services=(
            user
            game
            recommender
            gateway
            frontend
          )

          for service in "${services[@]}"; do
            echo "::group::Deploy ${service}"
            railway up --ci \
              --service "${service}" \
              --project "${RAILWAY_PROJECT_ID}" \
              --environment "${RAILWAY_ENVIRONMENT_NAME}"
            echo "::endgroup::"
          done
