name: NextPlay CI - Build & Test

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.5'

    - name: Cache Go dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-v2-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v2-

    - name: Build gateway service
      working-directory: services/gateway
      run: go build .

    - name: Build game service
      working-directory: services/game
      run: go build .

    - name: Build user service
      working-directory: services/user
      run: go build .

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/recommender/requirements.txt

    - name: Validate recommender service
      run: |
        python -c "import sys; sys.path.append('services'); import recommender.main"

    - name: Run recommender training tests
      run: |
        pytest -q services/recommender/tests/training/test_offline_eval.py
        pytest -q services/recommender/tests/training/test_retrain.py
        pytest -q services/recommender/tests/training/test_dataset_pipeline.py

    - name: Run retrain gate smoke (seeded fixture)
      run: |
        python -m services.recommender.training.retrain \
          --source_mode seeded_only \
          --run_id ci_gate \
          --runs_dir services/recommender/training/runs \
          --seed 42 \
          --seed_users 24 \
          --seed_games 80 \
          --seed_history_per_user 12 \
          --seed_holdout_per_user 1 \
          --epochs 1 \
          --batch_size 16 \
          --k 10

    - name: Validate retrain gate artifacts
      run: |
        python - <<'PY'
        import json
        from pathlib import Path

        run_dir = Path("services/recommender/training/runs/ci_gate")
        required = ["run_log.json", "dataset_profile.json", "gate_result.json"]
        missing = [name for name in required if not (run_dir / name).exists()]
        if missing:
            raise SystemExit(f"Missing required artifacts: {missing}")

        run_log = json.loads((run_dir / "run_log.json").read_text(encoding="utf-8"))
        gate_result = json.loads((run_dir / "gate_result.json").read_text(encoding="utf-8"))
        profile = json.loads((run_dir / "dataset_profile.json").read_text(encoding="utf-8"))

        if gate_result.get("code") != "ok":
            raise SystemExit(f"Gate failed: {gate_result}")
        if not run_log.get("metrics", {}).get("passed"):
            raise SystemExit("Offline metrics gate did not pass")

        model_metrics = run_log["metrics"]["model"]
        if model_metrics["recall_at_k"] <= 0 or model_metrics["ndcg_at_k"] <= 0:
            raise SystemExit(f"Expected non-zero metrics, got: {model_metrics}")

        if not profile.get("quality_passed"):
            raise SystemExit(f"Dataset quality failed unexpectedly: {profile.get('quality_failures')}")
        PY

    - name: Upload retrain gate artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: recommender-retrain-gate-artifacts
        path: services/recommender/training/runs/ci_gate

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Cache Node dependencies
      uses: actions/cache@v4
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Build Frontend
      working-directory: frontend
      run: npm run build
