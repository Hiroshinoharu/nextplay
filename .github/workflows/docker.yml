name: NextPlay - Build & Push Docker Images

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hiroshinoharu/nextplay

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      DOCKER_AUTH_CONFIG: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set isolated Docker config path
        run: echo "DOCKER_CONFIG=${RUNNER_TEMP}/.docker" >> "$GITHUB_ENV"

      - name: Prepare isolated Docker config
        run: |
          rm -rf "$DOCKER_CONFIG"
          mkdir -p "$DOCKER_CONFIG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN GitHub Actions secret." >&2
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

      - name: Build user
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/user/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/user:latest
          cache-from: type=gha,scope=user
          cache-to: type=gha,mode=max,scope=user

      - name: Build game
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/game/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/game:latest
          cache-from: type=gha,scope=game
          cache-to: type=gha,mode=max,scope=game

      - name: Build recommender
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/recommender/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/recommender:latest
          cache-from: type=gha,scope=recommender
          cache-to: type=gha,mode=max,scope=recommender

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
