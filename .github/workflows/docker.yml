# Name of pipeline
name: NextPlay - Build & Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hiroshinoharu/nextplay

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Build and push each microservice
      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/gateway
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/gateway:latest

      - name: Build & push user
        uses: docker/build-push-action@v5
        with:
          context: ./services/user
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/user:latest

      - name: Build & push game
        uses: docker/build-push-action@v5
        with:
          context: ./services/game
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/game:latest

      - name: Build & push recommender
        uses: docker/build-push-action@v5
        with:
          context: ./services/recommender
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/recommender:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest