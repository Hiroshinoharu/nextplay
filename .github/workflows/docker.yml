name: NextPlay - Build & Push Docker Images

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hiroshinoharu/nextplay

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------
      # Build & Push Gateway
      # ---------------------------
      - name: Build gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/gateway:latest

      # ---------------------------
      # Build & Push User
      # ---------------------------
      - name: Build user
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/user/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/user:latest

      # ---------------------------
      # Build & Push Game
      # ---------------------------
      - name: Build game
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/game/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/game:latest

      # ---------------------------
      # Build & Push Recommender
      # ---------------------------
      - name: Build recommender
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/recommender/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/recommender:latest

      # ---------------------------
      # Build & Push Frontend
      # ---------------------------
      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest