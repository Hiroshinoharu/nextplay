name: NextPlay - Build & Push Docker Images

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hiroshinoharu/nextplay-

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      # Pull source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push each microservice
      - name: Build & Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/gateway
          push: true
          tags: ${{ env.IMAGE_PREFIX }}gateway:latest

      - name: Build & Push User
        uses: docker/build-push-action@v5
        with:
          context: ./services/user
          push: true
          tags: ${{ env.IMAGE_PREFIX }}user:latest

      - name: Build & Push Game
        uses: docker/build-push-action@v5
        with:
          context: ./services/game
          push: true
          tags: ${{ env.IMAGE_PREFIX }}game:latest

      - name: Build & Push Recommender
        uses: docker/build-push-action@v5
        with:
          context: ./services/recommender
          push: true
          tags: ${{ env.IMAGE_PREFIX }}recommender:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}frontend:latest